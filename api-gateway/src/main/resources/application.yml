server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # Order Service routes
        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/orders/**,/api/v1/auth/**,/api/v1/admin/**
          filters:
            - name: AddRequestHeader
              args:
                name: X-Gateway-Source
                value: api-gateway

        # Notification WebSocket route
        - id: notification-ws
          uri: ws://${NOTIFICATION_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/ws/**

        # Notification HTTP route
        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/notifications/**

      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
            backoff:
              firstBackoff: 500ms
              maxBackoff: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
